name: Build mod optimise rust

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
      merge_prs:
        description: 'Comma-separated PR numbers to merge (e.g., "1,2,3" or "0" for none)'
        required: false
        default: ''
        type: string
        
      fetch_branches_from_other:
        description: 'Enter "username/repo branch" to fetch & merge, or 0 for none'
        required: false
        default: '0'
      merge_dns:
        description: 'merge DNS commit (0 = none)'
        required: false
        default: '0'  # Updated to support 16KB page alignment
        
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6.0.0
      
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
          swap-size-gb: 10
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
          go-version: '1.26'
          check-latest: true

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Activate patched Go
      shell: bash
      run: |
       go version
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '12266719'
        packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV


    - name: Verify 
      run: |
         which go
         which gomobile
         which cargo
         rustc --version

    - name: Build
      run: |
        mkdir -p assets data
        bash gen_assets.sh download
        cp -v data/*.dat assets/
        echo "Preparing Go environment..."
        go env -w GOPRIVATE=github.com/xtls/xray-core
        go env -w GONOSUMDB=github.com/xtls/xray-core

        echo "Finding Go module cache path..."
        MODCACHE=$(go env GOMODCACHE)
        echo "Module cache path: $MODCACHE"

        echo "Ensuring xray-core is a full git clone..."
        MOD_PATH="$MODCACHE/github.com/xtls/xray-core"
        rm -rf "$MOD_PATH"  # Remove any proxy-downloaded copy
        XRAY_PATH="$GITHUB_WORKSPACE/_deps/xray-core"
        rm -rf "$XRAY_PATH"
        
        # Clone the Rust-enabled Xray-core from Mit0chrondr1a
        git clone -b rust https://github.com/Mit0chrondr1a/Xray-core.git "$XRAY_PATH"
        cd "$XRAY_PATH"
        
        # Verify we're on the rust branch
        git branch -a
        git log --oneline -5

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ "${{ github.event.inputs.merge_dns }}" != "0" ]; then
         DNS_MSG="refactor(dns): streamline query handling and remove redundant deadline logic"
         QUIC_MSG="fix: optimize crypto data handling in SniffQUIC function"

         git remote add j2rong4cn https://github.com/j2rong4cn/Xray-core.git
         git fetch j2rong4cn main

         DNS_HOST_SHA=$(git log j2rong4cn/main --grep="$DNS_MSG" --format="%H" -n 1)
         if [ -n "$DNS_HOST_SHA" ]; then
           echo "Found commit: $DNS_HOST_SHA"
           git cherry-pick "$DNS_HOST_SHA" || true
         else
           echo "$DNS_MSG"
         fi
         
         
         QUIC_SHA=$(git log j2rong4cn/main --grep="$QUIC_MSG" --format="%H" -n 1)

         
         if [ -n "$QUIC_SHA" ]; then
           echo "Found commit: $QUIC_SHA"
           git cherry-pick "$QUIC_SHA" || true
          else
           echo "$QUIC_MSG"
          fi
         fi
        
        COUNT=${{ github.event.inputs.pr_count }}
        IFS=',' read -ra PR_LIST <<< "${{ github.event.inputs.merge_prs }}"
          for PR_NUM in "${PR_LIST[@]}"; do
            echo "Fetching PR #$PR_NUM..."
            git fetch origin pull/$PR_NUM/head:pr-$PR_NUM
            echo "Merging PR #$PR_NUM (auto-resolve: theirs)..."
            git merge -X theirs --no-edit pr-$PR_NUM || true
            echo "Changes from PR #$PR_NUM:"
            git log HEAD~1..HEAD --stat || true
          done

        # Merge branch from other repo if requested
        if [ "${{ github.event.inputs.fetch_branches_from_other }}" != "0" ]; then
         BRANCH_INPUT="${{ github.event.inputs.fetch_branches_from_other }}"
        fi
        if [[ "$BRANCH_INPUT" != "0" ]]; then
        IFS=',' read -ra EXT_LIST <<< "$BRANCH_INPUT"
         for ITEM in "${EXT_LIST[@]}"; do
         REPO=$(echo "$ITEM" | awk '{print $1}')
         BRANCH=$(echo "$ITEM" | awk '{print $2}')

        echo "Fetching branch '$BRANCH' from repo '$REPO'..."

        # Name remote based on repo to avoid collision
        REMOTE_NAME="ext_$(echo "$REPO" | sed 's|/|_|g')"

        git remote add "$REMOTE_NAME" "https://github.com/$REPO.git" || true
        git fetch "$REMOTE_NAME" "$BRANCH"

        echo "Merging $REMOTE_NAME/$BRANCH (auto-resolve theirs)..."
        git merge -X theirs --no-edit "$REMOTE_NAME/$BRANCH" || true

        git add -A
        echo "Changes from $REMOTE_NAME/$BRANCH:"
        git log HEAD~1..HEAD --stat || true

        done
        fi          
        
        
        
        wget https://raw.githubusercontent.com/t-e-s-tweb/v-rules/refs/heads/main/xmuxpatch.sh
        bash xmuxpatch.sh
        wget -qO "$XRAY_PATH/main/pgo_generate_test.go" \
        https://raw.githubusercontent.com/Mit0chrondr1a/Xray-core/refs/heads/perf/main/pgo_generate_test.go
        
        # Build the Rust library before going back to workspace
        echo "Building Rust library (libxray_rust)..."
        export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.2.13676358"
        export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
        
        # Find the Rust project within xray-core
        RUST_PROJECT_PATH="$XRAY_PATH/rust/xray-rust"
        if [ ! -d "$RUST_PROJECT_PATH" ]; then
          echo "Looking for Rust project in xray-core..."
          find "$XRAY_PATH" -name "Cargo.toml" -type f 2>/dev/null | head -5
          # Try alternative paths
          if [ -d "$XRAY_PATH/common/native/rust/xray-rust" ]; then
            RUST_PROJECT_PATH="$XRAY_PATH/common/native/rust/xray-rust"
          elif [ -d "$XRAY_PATH/xray-rust" ]; then
            RUST_PROJECT_PATH="$XRAY_PATH/xray-rust"
          fi
        fi
        
        if [ -d "$RUST_PROJECT_PATH" ]; then
          echo "Found Rust project at: $RUST_PROJECT_PATH"
          cd "$RUST_PROJECT_PATH"
          
          # Configure cargo for Android
          mkdir -p ~/.cargo
          echo '[target.aarch64-linux-android]' > ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-android21-clang"' >> ~/.cargo/config.toml
          echo 'ar = "llvm-ar"' >> ~/.cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "link-arg=-Wl,-z,common-page-size=16384", "-C", "link-arg=-Wl,--unresolved-symbols=ignore-in-shared-libs"]' >> ~/.cargo/config.toml

          
          # Add Android target and build
          rustup target add aarch64-linux-android
          cargo build --release --target aarch64-linux-android
        
          
          echo "Rust build complete. Libraries found:"
          find "$RUST_PROJECT_PATH" -name "libxray_rust*.a" -o -name "libxray_rust*.so" 2>/dev/null
          
          # Set the library path for later use
          echo "RUST_LIB_PATH=$RUST_PROJECT_PATH/target/release" >> $GITHUB_ENV
          echo "RUST_ANDROID_LIB_PATH=$RUST_PROJECT_PATH/target/aarch64-linux-android/release" >> $GITHUB_ENV
        else
          echo "Warning: Rust project not found in xray-core"
          echo "Xray-core structure:"
          ls -la "$XRAY_PATH/"
        fi

        #cd "$XRAY_PATH"
        #mkdir -p main
        #echo "Running representative proxy workload benchmark..."
        # go test -run=^$ \
        # -bench=BenchmarkPGOWorkload \
        #  -benchtime=15s \
        #  -count=1 \
        #  -cpuprofile=main/default.pgo \
        #  ./main/
        cd ${{ github.workspace }}/
        NDK_SYSROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
        LIB_DIR="$NDK_SYSROOT/usr/lib/aarch64-linux-android"
        mkdir -p "$LIB_DIR" "$LIB_DIR/21"
        echo "INPUT(-lc)" > "$LIB_DIR/libpthread.so"
        cp "$LIB_DIR/libpthread.so" "$LIB_DIR/21/"
        echo "✅ Dummy libpthread.so created in $LIB_DIR"
        echo "Updating go.mod to use local xray-core..."
        go mod edit -replace=github.com/xtls/xray-core="$XRAY_PATH"

        go get golang.org/x/mobile@latest
        go mod tidy
        go mod download
        

        
        
        
        echo "Binding for Android..."
        # Export parallel compilation (uses all CPU cores for faster builds)
        export GOMAXPROCS=$(nproc)
        export CGO_ENABLED=1
        export GOEXPERIMENT="runtimefreegc,sizespecializedmalloc,greenteagc,jsonv2,newinliner,heapminimum512kib"
        echo "Initializing gomobile..."
        gomobile init -v
        go mod tidy


       
        export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
        export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"
        export CGO_CFLAGS_ALLOW="-march.*|-mcpu.*|-mtune.*|-f.*|-W.*|-D.*|-O.*"
        export CGO_CXXFLAGS_ALLOW="-march.*|-mcpu.*|-mtune.*|-f.*|-W.*|-D.*|-O.*"
        export CGO_LDFLAGS_ALLOW="-Wl,.*|-f.*|-z.*|-s"
        export CGO_CFLAGS="-O2"
        export CGO_CXXFLAGS="-O2"
        
        
        # Set library paths for the linker - Android only
        RUST_LIB_DIR="${XRAY_PATH}/rust/xray-rust/target/aarch64-linux-android/release"
        echo "Setting Rust library path: ${RUST_LIB_DIR}"
        ls -la "${RUST_LIB_DIR}/libxray_rust.a" || echo "Warning: libxray_rust.a not found!"
        
        export CGO_LDFLAGS="-L${RUST_LIB_DIR} -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384 -Wl,-O2 -Wl,--hash-style=gnu"
        export LIBRARY_PATH="${RUST_LIB_DIR}:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="${RUST_LIB_DIR}:$LD_LIBRARY_PATH"

        echo "=== BUILD ENV ==="
        echo "GOOS=$GOOS"
        echo "GOARCH=$GOARCH"
        echo "CC=$CC"
        echo "CGO_LDFLAGS=$CGO_LDFLAGS"
        echo "LIBRARY_PATH=$LIBRARY_PATH"
        go env GOOS GOARCH CC CGO_CFLAGS
        echo "=================="
        
        # Verify Rust library exists
        if [ -n "$RUST_LIB_PATH" ] && [ -f "${RUST_LIB_PATH}/libxray_rust.a" ]; then
          echo "✅ Found libxray_rust.a at ${RUST_LIB_PATH}"
          ls -la "${RUST_LIB_PATH}/libxray_rust.a"
        elif [ -n "$RUST_ANDROID_LIB_PATH" ] && [ -f "${RUST_ANDROID_LIB_PATH}/libxray_rust.a" ]; then
          echo "✅ Found libxray_rust.a at ${RUST_ANDROID_LIB_PATH}"
          ls -la "${RUST_ANDROID_LIB_PATH}/libxray_rust.a"
        else
          echo "⚠️ libxray_rust.a not found, build may fail"
          find "$XRAY_PATH" -name "libxray_rust*" 2>/dev/null || true
        fi
        # Fix: Android doesn't have libpthread separately
        export CGO_LDFLAGS="$CGO_LDFLAGS -Wl,--allow-shlib-undefined"
        export GOFLAGS="-pgo=$XRAY_PATH/main/default.pgo"
        gomobile bind -v -x -androidapi 24 -trimpath -target=android/arm64 -gcflags="all=-l=4" -ldflags="-s -w -linkmode=external" ./
  
        
        #export CGO_LDFLAGS="-fuse-ld=lld -Wl,-z,separate-loadable-segments -Wl,-z,common-page-size=0x4000 -Wl,-z,max-page-size=0x4000 -Wl,--strip-all -Wl,--gc-sections"
        #gomobile bind -v -x -androidapi 24 -trimpath -gcflags="all=-l=4" \
        #-ldflags="-s -w -buildid='' -linkmode external -extldflags='-Wl,-z,now -Wl,-z,separate-loadable-segments -Wl,-z,common-page-size=0x4000 -Wl,-z,max-page-size=0x4000 -Wl,--strip-all -Wl,--gc-sections'" \
        #./
        #gomobile bind -androidapi 24 -trimpath -gcflags="all=-l=4" \
        #-ldflags="-s -w -buildid='' -linkmode external -extldflags=-Wl,-z,now,-Wl,-z,separate-loadable-segments,-Wl,-z,common-page-size=0x4000,-Wl,-z,max-page-size=0x4000,-Wl,--strip-all,-Wl,--gc-sections" \
        #./

        #gomobile bind -v -x -androidapi 24 -trimpath -gcflags="all=-l=4" -ldflags="-s -w -buildid='' -linkmode external -extldflags=\"$CGO_LDFLAGS\"" ./

        #gomobile bind -v -x -androidapi 24 -trimpath -gcflags="all=-l=4" -ldflags="-s -w -buildid='' -linkmode external -extldflags=$CGO_LDFLAGS" ./
  

    - name: Strip native libraries in AAR
      run: |
       # Setup paths
        AAR_FILE="libv2ray.aar"
        EXTRACT_DIR="aar_extract"
        NDK_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
    
        # Verify AAR exists
       if [ ! -f "$AAR_FILE" ]; then
        echo "Error: $AAR_FILE not found!"
        exit 1
       fi
    
       # Create extraction directory
       mkdir -p "$EXTRACT_DIR"
    
       # Extract AAR (it's just a ZIP)
       echo "Extracting $AAR_FILE..."
       unzip -q "$AAR_FILE" -d "$EXTRACT_DIR"
    
       # Find and strip all .so files
       echo "Stripping native libraries..."
       find "$EXTRACT_DIR" -name "*.so" -type f | while read -r so_file; do
       arch=$(basename "$(dirname "$so_file")")
       echo "  Processing [$arch]: $(basename "$so_file")"
      
       # Get size before
       size_before=$(stat -c%s "$so_file" 2>/dev/null || stat -f%z "$so_file" 2>/dev/null)
      
       # Strip: --strip-all removes all symbols (same as -s)
       "$NDK_STRIP" --strip-all "$so_file"
      
       # Get size after
       size_after=$(stat -c%s "$so_file" 2>/dev/null || stat -f%z "$so_file" 2>/dev/null)
       saved=$((size_before - size_after))
      
       echo "    Saved: $saved bytes ($(numfmt --to=iec $saved 2>/dev/null || echo "$saved"))"
       done
    
       # Repackage AAR with maximum compression
       echo "Repackaging AAR..."
       cd "$EXTRACT_DIR"
     
       # Create new AAR with optimized compression
       # -X: no extra file attributes (cleaner)
       # -9: maximum compression
       zip -r -X -9 "../${AAR_FILE}.tmp" .
       cd ..
    
       # Replace original
       mv "${AAR_FILE}.tmp" "$AAR_FILE"
    
       # Cleanup
       rm -rf "$EXTRACT_DIR"
    
       # Show final result
       echo "Post-strip AAR size: $(ls -lh $AAR_FILE | awk '{print $5}')"


    - name: Upload build artifacts
      if: github.event.inputs.release_tag == ''
      uses: actions/upload-artifact@v6.0.0
      with:
        name: libv2ray
        path: |
          ${{ github.workspace }}/libv2ray*r

    - name: Upload AndroidLibXrayLite to release
      if: github.event.inputs.release_tag != ''
      uses: svenstaro/upload-release-action@v2
      with:
        file: ./libv2ray*r
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        overwrite: true
